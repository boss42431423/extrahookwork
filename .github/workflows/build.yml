name: Build extrahook

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download iOS 16.5 SDK
        run: |
          curl -fsSL \
            https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz \
            | tar -xJf - -C $HOME/theos/sdks

      - name: Build
        run: make package FINALPACKAGE=1 DEBUG=0
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: extrahook
          path: packages/*.tipa
          if-no-files-found: error
