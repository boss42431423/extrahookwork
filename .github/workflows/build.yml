name: Build PastaWare

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build .deb & .tipa
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: ${{ github.workspace }}/theos
          key: theos-${{ runner.os }}-v3

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Link Xcode iOS SDK into Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          mkdir -p $THEOS/sdks
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "Found SDK: iPhoneOS${SDK_VER}.sdk at $SDK_PATH"
          ln -sfn "$SDK_PATH" "$THEOS/sdks/iPhoneOS${SDK_VER}.sdk"
          echo "SDK_VER=${SDK_VER}" >> $GITHUB_ENV

      - name: Build package
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          make package FINALPACKAGE=1 DEBUG=0 \
            TARGET="iphone:clang:${SDK_VER}:15.0"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: PastaWare-deb
          path: packages/*.deb
          if-no-files-found: warn

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: PastaWare-tipa
          path: packages/*.tipa
          if-no-files-found: warn

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: |
            packages/*.deb
            packages/*.tipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
