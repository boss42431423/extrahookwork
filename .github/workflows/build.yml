name: Build XternalZ

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Install Theos
        run: |
          set -e
          sudo mkdir -p /opt/theos
          sudo chown $(whoami) /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          curl -LO https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          sudo mkdir -p /opt/theos/sdks
          sudo tar -xf iPhoneOS16.5.sdk.tar.xz -C /opt/theos/sdks
          ls /opt/theos/sdks/

      - name: Build
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1 DEBUG=0
        working-directory: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XternalZ-tipa
          path: packages/XternalZ.tipa
          if-no-files-found: error
